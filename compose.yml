services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: adhdo
      POSTGRES_USER: adhdo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adhdo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/pljeske/adhdoit-backend:latest
    build:
      context: ./backend
    user: 65532:0
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://adhdo:${DB_PASSWORD}@db:5432/adhdo?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      PORT: 8080
      ENVIRONMENT: production
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/pljeske/adhdoit-frontend:latest
    user: 79234:0
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      BACKEND_URL: $BACKEND_URL
      BACKEND_PORT: $BACKEND_PORT
    depends_on: [backend]

volumes:
  pgdata:
  caddy_data:
  caddy_config:
