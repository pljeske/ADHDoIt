root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  kill_delay = "2s"
  send_interrupt = true
  stop_on_error = false
  log = "build-errors.log"

[log]
  time = true

[color]
  build = "yellow"
  runner = "green"
  watcher = "cyan"
  app = ""

[misc]
  clean_on_exit = true
